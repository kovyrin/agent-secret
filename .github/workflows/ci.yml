name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Run lints and tests
        run: mise run lint

      - name: Build commands and app bundle
        run: mise run build

  smoke-tests:
    name: Smoke Tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Run non-secret smoke tests
        run: mise run test:smoke

  draft-release-artifacts:
    name: Build Release Artifact (${{ matrix.arch }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Verify release signing configuration
        env:
          AGENT_SECRET_CODESIGN_CERT_P12_BASE64: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_P12_BASE64 }}
          AGENT_SECRET_CODESIGN_CERT_PASSWORD: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_PASSWORD }}
          AGENT_SECRET_CODESIGN_IDENTITY: ${{ secrets.AGENT_SECRET_CODESIGN_IDENTITY }}
          AGENT_SECRET_NOTARIZE: ${{ secrets.AGENT_SECRET_NOTARIZE }}
          AGENT_SECRET_NOTARY_ISSUER_ID: ${{ secrets.AGENT_SECRET_NOTARY_ISSUER_ID }}
          AGENT_SECRET_NOTARY_KEY: ${{ secrets.AGENT_SECRET_NOTARY_KEY }}
          AGENT_SECRET_NOTARY_KEY_ID: ${{ secrets.AGENT_SECRET_NOTARY_KEY_ID }}
        run: scripts/check-release-signing-env.sh

      - name: Import Developer ID certificate
        env:
          AGENT_SECRET_CODESIGN_CERT_P12_BASE64: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_P12_BASE64 }}
          AGENT_SECRET_CODESIGN_CERT_PASSWORD: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_PASSWORD }}
          AGENT_SECRET_CODESIGN_KEYCHAIN_PATH: ${{ runner.temp }}/agent-secret-codesign.keychain-db
        run: scripts/import-codesign-certificate.sh

      - name: Build release artifacts
        env:
          AGENT_SECRET_CODESIGN_ENTITLEMENTS: ${{ secrets.AGENT_SECRET_CODESIGN_ENTITLEMENTS }}
          AGENT_SECRET_CODESIGN_IDENTITY: ${{ secrets.AGENT_SECRET_CODESIGN_IDENTITY }}
          AGENT_SECRET_NOTARIZE: ${{ secrets.AGENT_SECRET_NOTARIZE }}
          AGENT_SECRET_NOTARY_ISSUER_ID: ${{ secrets.AGENT_SECRET_NOTARY_ISSUER_ID }}
          AGENT_SECRET_NOTARY_KEY: ${{ secrets.AGENT_SECRET_NOTARY_KEY }}
          AGENT_SECRET_NOTARY_KEY_ID: ${{ secrets.AGENT_SECRET_NOTARY_KEY_ID }}
        run: scripts/build-release.sh "$GITHUB_REF_NAME" --require-production-signing

      - name: Verify release artifact architecture
        run: |
          test "$(uname -m)" = "${{ matrix.arch }}"
          test -f "dist/Agent-Secret-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}.dmg"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/Agent-Secret-${{ github.ref_name }}-macos-${{ matrix.arch }}.dmg
            dist/checksums.txt

      - name: Delete temporary signing keychain
        if: ${{ always() }}
        env:
          AGENT_SECRET_CODESIGN_KEYCHAIN_PATH: ${{ runner.temp }}/agent-secret-codesign.keychain-db
        run: |
          if [ -f "$AGENT_SECRET_CODESIGN_KEYCHAIN_PATH" ]; then
            security delete-keychain "$AGENT_SECRET_CODESIGN_KEYCHAIN_PATH"
          fi

  publish-draft-release:
    name: Publish Draft Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: draft-release-artifacts
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-artifacts
          pattern: release-*

      - name: Assemble release assets
        run: |
          mkdir -p dist
          cp "dist/release-artifacts/release-arm64/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg" dist/
          cp "dist/release-artifacts/release-x86_64/Agent-Secret-${GITHUB_REF_NAME}-macos-x86_64.dmg" dist/
          cat \
            dist/release-artifacts/release-arm64/checksums.txt \
            dist/release-artifacts/release-x86_64/checksums.txt \
            >dist/checksums.txt

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          artifacts=(
            "dist/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg"
            "dist/Agent-Secret-${GITHUB_REF_NAME}-macos-x86_64.dmg"
            "dist/checksums.txt"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${artifacts[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "${artifacts[@]}" \
              --draft \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "macOS arm64 and x86_64 artifacts built from $GITHUB_SHA."
          fi
