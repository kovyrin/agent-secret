name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AGENT_SECRET_MISE_VERSION: "2026.4.28"
  AGENT_SECRET_MISE_SHA256_MACOS_ARM64: f0f5fa48643a00442c8cc066f8350285896561f2491bcbbee93b1a9a8249816d

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac
        with:
          version: ${{ env.AGENT_SECRET_MISE_VERSION }}
          sha256: ${{ env.AGENT_SECRET_MISE_SHA256_MACOS_ARM64 }}
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Run lints and tests
        run: mise run lint

      - name: Build commands and app bundle
        env:
          AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID: ${{ secrets.AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID }}
          AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET: ${{ secrets.AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET }}
        run: mise run build

  smoke-tests:
    name: Smoke Tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac
        with:
          version: ${{ env.AGENT_SECRET_MISE_VERSION }}
          sha256: ${{ env.AGENT_SECRET_MISE_SHA256_MACOS_ARM64 }}
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Run non-secret smoke tests
        run: mise run test:smoke

  draft-release-artifacts:
    name: Build Release Artifact (arm64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify release tag ancestry
        run: scripts/release/check-release-ancestry.sh "$GITHUB_REF_NAME"

      - name: Verify changelog release notes
        run: scripts/release/extract-release-notes.sh "$GITHUB_REF_NAME" "$RUNNER_TEMP/release-notes.md"

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac
        with:
          version: ${{ env.AGENT_SECRET_MISE_VERSION }}
          sha256: ${{ env.AGENT_SECRET_MISE_SHA256_MACOS_ARM64 }}
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Verify release signing configuration
        env:
          AGENT_SECRET_CODESIGN_CERT_P12_BASE64: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_P12_BASE64 }}
          AGENT_SECRET_CODESIGN_CERT_PASSWORD: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_PASSWORD }}
          AGENT_SECRET_CODESIGN_IDENTITY: ${{ secrets.AGENT_SECRET_CODESIGN_IDENTITY }}
          AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID: ${{ secrets.AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID }}
          AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET: ${{ secrets.AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET }}
          AGENT_SECRET_NOTARIZE: ${{ secrets.AGENT_SECRET_NOTARIZE }}
          AGENT_SECRET_NOTARY_ISSUER_ID: ${{ secrets.AGENT_SECRET_NOTARY_ISSUER_ID }}
          AGENT_SECRET_NOTARY_KEY: ${{ secrets.AGENT_SECRET_NOTARY_KEY }}
          AGENT_SECRET_NOTARY_KEY_ID: ${{ secrets.AGENT_SECRET_NOTARY_KEY_ID }}
        run: scripts/release/check-release-signing-env.sh

      - name: Import Developer ID certificate
        env:
          AGENT_SECRET_CODESIGN_CERT_P12_BASE64: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_P12_BASE64 }}
          AGENT_SECRET_CODESIGN_CERT_PASSWORD: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_PASSWORD }}
        run: scripts/release/import-codesign-certificate.sh

      - name: Build release artifacts
        env:
          AGENT_SECRET_IN_MISE: "1"
          AGENT_SECRET_CODESIGN_IDENTITY: ${{ secrets.AGENT_SECRET_CODESIGN_IDENTITY }}
          AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID: ${{ secrets.AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID }}
          AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET: ${{ secrets.AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET }}
          AGENT_SECRET_NOTARIZE: ${{ secrets.AGENT_SECRET_NOTARIZE }}
          AGENT_SECRET_NOTARY_ISSUER_ID: ${{ secrets.AGENT_SECRET_NOTARY_ISSUER_ID }}
          AGENT_SECRET_NOTARY_KEY: ${{ secrets.AGENT_SECRET_NOTARY_KEY }}
          AGENT_SECRET_NOTARY_KEY_ID: ${{ secrets.AGENT_SECRET_NOTARY_KEY_ID }}
        run: mise exec -- scripts/release/build-release.sh "$GITHUB_REF_NAME" --require-production-signing

      - name: Verify release artifact architecture
        run: |
          test "$(uname -m)" = "arm64"
          test -f "_dist/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-arm64
          if-no-files-found: error
          path: |
            _dist/Agent-Secret-${{ github.ref_name }}-macos-arm64.dmg
            _dist/checksums.txt

      - name: Delete temporary signing keychain
        if: ${{ always() }}
        run: |
          keychain_path="$RUNNER_TEMP/agent-secret-codesign.keychain-db"
          if [ -f "$keychain_path" ]; then
            security delete-keychain "$keychain_path"
          fi

  publish-draft-release:
    name: Publish Draft Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: draft-release-artifacts
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: _dist/release-artifacts
          pattern: release-*

      - name: Assemble release assets
        run: |
          mkdir -p _dist
          cp "_dist/release-artifacts/release-arm64/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg" _dist/
          cp "_dist/release-artifacts/release-arm64/checksums.txt" _dist/checksums.txt
          scripts/release/prepare-bootstrap-scripts.sh "$GITHUB_REF_NAME" _dist

      - name: Extract changelog release notes
        run: scripts/release/extract-release-notes.sh "$GITHUB_REF_NAME" _dist/release-notes.md

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AGENT_SECRET_RELEASE_NOTES_FILE: _dist/release-notes.md
        run: |
          scripts/release/publish-draft-release.sh "$GITHUB_REF_NAME" \
            "_dist/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg" \
            "_dist/checksums.txt" \
            "_dist/install.sh" \
            "_dist/uninstall.sh"
