name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AGENT_SECRET_MISE_VERSION: "2026.4.28"
  AGENT_SECRET_MISE_SHA256_MACOS_ARM64: f0f5fa48643a00442c8cc066f8350285896561f2491bcbbee93b1a9a8249816d

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac
        with:
          version: ${{ env.AGENT_SECRET_MISE_VERSION }}
          sha256: ${{ env.AGENT_SECRET_MISE_SHA256_MACOS_ARM64 }}
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Run lints and tests
        run: mise run lint

      - name: Build commands and app bundle
        run: mise run build

  smoke-tests:
    name: Smoke Tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac
        with:
          version: ${{ env.AGENT_SECRET_MISE_VERSION }}
          sha256: ${{ env.AGENT_SECRET_MISE_SHA256_MACOS_ARM64 }}
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Run non-secret smoke tests
        run: mise run test:smoke

  draft-release-artifacts:
    name: Build Release Artifact (${{ matrix.arch }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            mise_sha256: f0f5fa48643a00442c8cc066f8350285896561f2491bcbbee93b1a9a8249816d
          - arch: x86_64
            runner: macos-15-intel
            mise_sha256: 43c02a612949a37ba53bb4e1e89859da2b198b6e7dad753f31cf66db5af36b19
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify release tag ancestry
        run: scripts/check-release-ancestry.sh "$GITHUB_REF_NAME"

      - name: Verify changelog release notes
        run: scripts/extract-release-notes.sh "$GITHUB_REF_NAME" "$RUNNER_TEMP/release-notes.md"

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac
        with:
          version: ${{ env.AGENT_SECRET_MISE_VERSION }}
          sha256: ${{ matrix.mise_sha256 }}
          install: true
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install project dependencies
        run: mise run setup

      - name: Verify release signing configuration
        env:
          AGENT_SECRET_CODESIGN_CERT_P12_BASE64: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_P12_BASE64 }}
          AGENT_SECRET_CODESIGN_CERT_PASSWORD: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_PASSWORD }}
          AGENT_SECRET_CODESIGN_IDENTITY: ${{ secrets.AGENT_SECRET_CODESIGN_IDENTITY }}
          AGENT_SECRET_NOTARIZE: ${{ secrets.AGENT_SECRET_NOTARIZE }}
          AGENT_SECRET_NOTARY_ISSUER_ID: ${{ secrets.AGENT_SECRET_NOTARY_ISSUER_ID }}
          AGENT_SECRET_NOTARY_KEY: ${{ secrets.AGENT_SECRET_NOTARY_KEY }}
          AGENT_SECRET_NOTARY_KEY_ID: ${{ secrets.AGENT_SECRET_NOTARY_KEY_ID }}
        run: scripts/check-release-signing-env.sh

      - name: Import Developer ID certificate
        env:
          AGENT_SECRET_CODESIGN_CERT_P12_BASE64: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_P12_BASE64 }}
          AGENT_SECRET_CODESIGN_CERT_PASSWORD: ${{ secrets.AGENT_SECRET_CODESIGN_CERT_PASSWORD }}
        run: scripts/import-codesign-certificate.sh

      - name: Build release artifacts
        env:
          AGENT_SECRET_IN_MISE: "1"
          AGENT_SECRET_CODESIGN_ENTITLEMENTS: ${{ secrets.AGENT_SECRET_CODESIGN_ENTITLEMENTS }}
          AGENT_SECRET_CODESIGN_IDENTITY: ${{ secrets.AGENT_SECRET_CODESIGN_IDENTITY }}
          AGENT_SECRET_NOTARIZE: ${{ secrets.AGENT_SECRET_NOTARIZE }}
          AGENT_SECRET_NOTARY_ISSUER_ID: ${{ secrets.AGENT_SECRET_NOTARY_ISSUER_ID }}
          AGENT_SECRET_NOTARY_KEY: ${{ secrets.AGENT_SECRET_NOTARY_KEY }}
          AGENT_SECRET_NOTARY_KEY_ID: ${{ secrets.AGENT_SECRET_NOTARY_KEY_ID }}
        run: mise exec -- scripts/build-release.sh "$GITHUB_REF_NAME" --require-production-signing

      - name: Verify release artifact architecture
        run: |
          test "$(uname -m)" = "${{ matrix.arch }}"
          test -f "dist/Agent-Secret-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}.dmg"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/Agent-Secret-${{ github.ref_name }}-macos-${{ matrix.arch }}.dmg
            dist/checksums.txt

      - name: Delete temporary signing keychain
        if: ${{ always() }}
        run: |
          keychain_path="$RUNNER_TEMP/agent-secret-codesign.keychain-db"
          if [ -f "$keychain_path" ]; then
            security delete-keychain "$keychain_path"
          fi

  publish-draft-release:
    name: Publish Draft Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: draft-release-artifacts
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist/release-artifacts
          pattern: release-*

      - name: Assemble release assets
        run: |
          mkdir -p dist
          cp "dist/release-artifacts/release-arm64/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg" dist/
          cp "dist/release-artifacts/release-x86_64/Agent-Secret-${GITHUB_REF_NAME}-macos-x86_64.dmg" dist/
          cat \
            dist/release-artifacts/release-arm64/checksums.txt \
            dist/release-artifacts/release-x86_64/checksums.txt \
            >dist/checksums.txt

      - name: Extract changelog release notes
        run: scripts/extract-release-notes.sh "$GITHUB_REF_NAME" dist/release-notes.md

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AGENT_SECRET_RELEASE_NOTES_FILE: dist/release-notes.md
        run: |
          scripts/publish-draft-release.sh "$GITHUB_REF_NAME" \
            "dist/Agent-Secret-${GITHUB_REF_NAME}-macos-arm64.dmg" \
            "dist/Agent-Secret-${GITHUB_REF_NAME}-macos-x86_64.dmg" \
            "dist/checksums.txt"
