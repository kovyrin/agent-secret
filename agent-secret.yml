version: 1

profiles:
  cloudflare-pages:
    reason: Deploy and inspect Agent Secret website on Cloudflare Pages
    ttl: 10m
    secrets:
      CLOUDFLARE_API_TOKEN: op://Private/Agent Secret Cloudflare Deploy Token/credential

  bundled-gcp-oauth-client:
    reason: Build Agent Secret with the bundled GCP OAuth Desktop client
    ttl: 10m
    secrets:
      AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_ID: op://Private/Agent Secret Bundled OAuth Client/client_id
      AGENT_SECRET_BUNDLED_GCP_OAUTH_CLIENT_SECRET: op://Private/Agent Secret Bundled OAuth Client/client_secret
