[tools]
go = "1.26.2"
node = "24.15.0"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:mvdan/sh" = "3.13.1"
taplo = "0.10.0"
swiftlint = "0.63.2"
swiftformat = "0.61.1"
golangci-lint = "2.11.4"
gitleaks = "8.30.1"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.3.0"

[tasks.setup]
description = "Install pinned toolchain and npm dependencies"
run = "mise install && npm ci --ignore-scripts --no-audit --no-fund && scripts/install-git-hooks.sh"

[tasks.lint]
description = "Run all lint and test checks"
run = "AGENT_SECRET_IN_MISE=1 scripts/lint.sh"

[tasks.format]
description = "Format Go, Swift, shell, and TOML files"
run = "AGENT_SECRET_IN_MISE=1 scripts/format.sh"

[tasks."lint:go"]
description = "Run Go format, vet, and golangci-lint checks"
run = "AGENT_SECRET_IN_MISE=1 scripts/lint-go.sh"

[tasks."lint:swift"]
description = "Run SwiftLint and SwiftFormat"
run = """
AGENT_SECRET_IN_MISE=1 scripts/check-format.sh swift
swiftlint lint --strict --no-cache
"""

[tasks."lint:shell"]
description = "Run shell syntax, style, and formatting checks"
run = "shellcheck scripts/*.sh approver/scripts/*.sh && AGENT_SECRET_IN_MISE=1 scripts/check-format.sh shell"

[tasks."lint:toml"]
description = "Run TOML formatting checks"
run = "AGENT_SECRET_IN_MISE=1 scripts/check-format.sh toml"

[tasks."lint:secrets"]
description = "Scan the working tree for committed secret values"
run = "gitleaks dir . --redact --no-banner"

[tasks."lint:vuln"]
description = "Scan Go packages for known reachable vulnerabilities"
run = "govulncheck ./..."

[tasks."lint:smart"]
description = "Run smart lints for staged files"
run = "AGENT_SECRET_IN_MISE=1 scripts/lint-smart.sh --staged"

[tasks.test]
description = "Run Go and Swift tests"
run = """
go test ./...
cd approver && swift test
"""

[tasks."test:race"]
description = "Run Go tests with the race detector enabled"
run = "go test -race ./..."

[tasks."test:coverage"]
description = "Run Go tests with coverage floors for internal packages"
run = "scripts/check-go-coverage.sh"

[tasks.build]
description = "Build Go commands and the macOS approver app"
run = """
go build ./cmd/agent-secret ./cmd/agent-secretd
cd approver && ./scripts/build-app.sh
"""
